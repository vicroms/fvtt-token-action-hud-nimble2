name: Release Creation

on:
  release:
    types: [published]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Extract tag version number
      id: get_version
      run: |
        TAG="${GITHUB_REF#refs/tags/}"
        VERSION="${TAG#v}"
        echo "version-without-v=$VERSION" >> $GITHUB_OUTPUT

    # Substitute the Manifest and Download URLs in the module.json
    - name: Substitute Manifest and Download Links For Versioned Ones
      run: |
        VERSION="${{ steps.get_version.outputs.version-without-v }}"
        REPO="${{ github.repository }}"
        TAG="${{ github.event.release.tag_name }}"
        jq \
          --arg version "$VERSION" \
          --arg url "https://github.com/$REPO" \
          --arg manifest "https://github.com/$REPO/releases/latest/download/module.json" \
          --arg download "https://github.com/$REPO/releases/download/$TAG/module.zip" \
          '.version = $version | .url = $url | .manifest = $manifest | .download = $download' \
          module.json > module.tmp.json && mv module.tmp.json module.json

    # Build the module
    - uses: actions/setup-node@v4
      with:
        node-version: '22'
    - run: npm install
    - run: npm run build

    # Create a zip file with all files required by the module
    - run: zip -r ./module.zip module.json readme.md LICENSE languages/ scripts/token-action-hud-nimble2.min.js styles/

    # Upload release artifacts
    - name: Update Release with Files
      id: create_version_release
      uses: ncipollo/release-action@v1
      with:
        allowUpdates: true
        name: ${{ github.event.release.name }}
        draft: ${{ github.event.release.unpublished }}
        prerelease: ${{ github.event.release.prerelease }}
        token: ${{ secrets.GITHUB_TOKEN }}
        artifacts: './module.json, ./module.zip'
        tag: ${{ github.event.release.tag_name }}
        body: ${{ github.event.release.body }}
